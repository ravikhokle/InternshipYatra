services:
  - type: web
    name: internshipyatra-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRATE
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: URI
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://internshipyatra.vercel.app
